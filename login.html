<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Smart Finance</title>
  
  <!-- Django template tag placeholder -->
  <!-- {% load static %} -->
  
  <!-- In a real Django project, use href="{% static 'css/Base.css' %}" -->
  <link rel="stylesheet" href="assets/css/Base.css">
  <link rel="stylesheet" href="assets/css/login.css">
</head>
<body class="auth-page">

  <main class="auth-container">
    <header class="auth-header">
      <div class="auth-logo">SF</div>
      <h1>Welcome Back</h1>
      <p>Enter your details to access your dashboard.</p>
    </header>

    <div class="auth-body">
      <!-- Django form placeholder -->
      <form method="POST" action="">
        <!-- {% csrf_token %} -->
        
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <div class="auth-options">
          <label class="remember-me">
            <input type="checkbox" name="remember">
            Remember me
          </label>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="btn-auth">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
    </div>
  </main>

</body>
</html>
