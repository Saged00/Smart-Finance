<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Smart Finance</title>
  
  <!-- Django template tag placeholder -->
  <!-- {% load static %} -->
  
  <!-- In a real Django project, use href="{% static 'css/Base.css' %}" -->
  <link rel="stylesheet" href="assets/css/Base.css">
  <link rel="stylesheet" href="assets/css/login.css">
</head>
<body class="auth-page">

  <main class="auth-container">
    <header class="auth-header">
      <div class="auth-logo">SF</div>
      <h1>Create an Account</h1>
      <p>Start managing your finances effectively.</p>
    </header>

    <div class="auth-body">
      <!-- Django form placeholder -->
      <form method="POST" action="">
        <!-- {% csrf_token %} -->
        
        <div class="form-row">
          <div class="form-group">
            <label for="first_name">First Name</label>
            <input type="text" id="first_name" name="first_name" class="form-control" placeholder="Mariam" required autocomplete="given-name">
          </div>
          <div class="form-group">
            <label for="last_name">Last Name</label>
            <input type="text" id="last_name" name="last_name" class="form-control" placeholder="Doe" required autocomplete="family-name">
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="Create a strong password" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn-auth">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </main>

</body>
</html>
